*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Tahoma,sans-serif;
background:#f4f7fb;
direction:rtl;
}

header{
background:linear-gradient(135deg,#0b5d3b,#1b8f5a);
color:white;
padding:25px;
text-align:center;
}

header h1{
font-size:30px;
}

.container{
width:95%;
max-width:1300px;
margin:auto;
padding:20px 0;
}

.profile{
background:white;
padding:20px;
border-radius:20px;
text-align:center;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:5px solid #1b8f5a;
margin-bottom:10px;
}

.profile h2{
color:#0b5d3b;
margin-bottom:10px;
}

.search{
margin-bottom:20px;
}

.search input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
outline:none;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.3s;
border-top:5px solid #1b8f5a;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
color:#0b5d3b;
margin-bottom:10px;
}

.modal{
position:fixed;
top:0;
right:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
padding:15px;
z-index:999;
}

.modal-content{
background:white;
width:100%;
max-width:550px;
max-height:90vh;
overflow:auto;
padding:20px;
border-radius:20px;
position:relative;
}

.close{
position:absolute;
left:15px;
top:10px;
font-size:30px;
cursor:pointer;
color:red;
}

.district{
background:#f3f6fb;
padding:12px;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
}

.info{
display:none;
background:#e9f8ef;
padding:10px;
margin-top:8px;
border-radius:10px;
}

footer{
background:#0b5d3b;
color:white;
text-align:center;
padding:15px;
margin-top:30px;
}

@media(max-width:768px){
header h1{
font-size:24px;
}
}
/* profile page */

.profile-page{
margin:20px;
}

.cover-photo{
height:220px;
background:linear-gradient(135deg,#0b5d3b,#1b8f5a);
border-radius:25px;
}

.profile-card{
background:white;
margin-top:-80px;
padding:20px;
border-radius:25px;
text-align:center;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
position:relative;
}

.profile-img{
width:140px;
height:140px;
border-radius:50%;
border:6px solid white;
object-fit:cover;
margin-top:-90px;
background:white;
}

.profile-card h2{
margin-top:10px;
color:#0b5d3b;
font-size:28px;
}

.profile-card p{
margin-top:10px;
color:#555;
font-size:17px;
}

.profile-info{
display:flex;
justify-content:space-around;
margin-top:25px;
flex-wrap:wrap;
gap:10px;
}

.info-box{
background:#f4f7fb;
padding:15px;
border-radius:15px;
width:100px;
}

.info-box h3{
color:#0b5d3b;
font-size:24px;
}

.info-box span{
font-size:14px;
color:#555;
}

.edit-btn{
margin-top:25px;
padding:12px 25px;
border:none;
background:#0b5d3b;
color:white;
font-size:16px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.edit-btn:hover{
background:#1b8f5a;
}

/* 3 dot menu */

.menu-container{
position:absolute;
top:20px;
left:20px;
}

.menu-btn{
background:#0b5d3b;
color:white;
border:none;
font-size:28px;
width:50px;
height:50px;
border-radius:50%;
cursor:pointer;
}

.menu-box{
display:none;
position:absolute;
top:60px;
left:0;
background:white;
width:200px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
overflow:hidden;
z-index:999;
}

.menu-box p{
padding:15px;
cursor:pointer;
border-bottom:1px solid #eee;
transition:0.3s;
}

.menu-box p:hover{
background:#f4f7fb;
}
/* BUTTONS */

.buttons button{
width:20px%;
padding:15px;
border:none;
border-radius:15px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

body {

background-color: orange;

}

</style>

function renderProvinces(data){

const grid = document.getElementById("provinceGrid");
grid.innerHTML = "";

data.forEach((province)=>{

// اصلي index پیدا کول
const realIndex = provinces.indexOf(province);

grid.innerHTML += `
<div class="card" onclick="openProvince(${realIndex})">
<h2>${province.name}</h2>
<p>${province.info}</p>
</div>
`;

});

}
renderProvinces(provinces);

function openProvince(index){

const province = provinces[index];

document.getElementById("modal").style.display="flex";

document.getElementById("provinceTitle").innerText=
province.name + " ";

let html = "";

province.districts.forEach((district,i)=>{

html += `
<div class="district" onclick="toggleInfo(${index},${i})">
<strong>${district.name}</strong>
<div class="info" id="info-${index}-${i}">
${district.info}
</div>
</div>
`;

});

document.getElementById("districtContainer").innerHTML = html;

}

function toggleInfo(p,d){

const box = document.getElementById(`info-${p}-${d}`);

if(box.style.display === "block"){
box.style.display = "none";
}else{
box.style.display = "block";
}

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

// سرچ

document.getElementById("searchInput")
.addEventListener("keyup", function(){

const value = this.value.toLowerCase();

const filtered = provinces.filter(province =>
province.name.toLowerCase().includes(value)
);

renderProvinces(filtered);





});


/* 3 dot system */

function toggleMenu(){

const menu =
document.getElementById("menuBox");

if(menu.style.display === "block"){

menu.style.display = "none";

}else{

menu.style.display = "block";

}

}
